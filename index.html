<script>
  // Script para el funcionamiento de los Modales
  (function() {
    // 1. MODAL PEDAGOGÍA
    const modalPed = document.getElementById("modalPedagogia");
    const btnAbrirPed = document.getElementById("abrirModalPed");
    const btnCerrarPed = document.getElementById("cerrarModalPed");

    if (btnAbrirPed && modalPed) {
      btnAbrirPed.onclick = function() {
        modalPed.style.display = "block";
        document.body.style.overflow = "hidden";
      }
    }
    if (btnCerrarPed) {
      btnCerrarPed.onclick = function() {
        modalPed.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }

    // 2. MODAL INSTRUCCIONES
    const modalInst = document.getElementById("modalInstrucciones");
    const btnAbrirInst = document.getElementById("abrirModalInst");
    const btnCerrarInst = document.getElementById("cerrarModalInst");

    if (btnAbrirInst && modalInst) {
      btnAbrirInst.onclick = function() {
        modalInst.style.display = "block";
        document.body.style.overflow = "hidden";
      }
    }
    if (btnCerrarInst) {
      btnCerrarInst.onclick = function() {
        modalInst.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }

    // 3. CERRAR AL HACER CLIC FUERA DEL CONTENIDO
    window.onclick = function(event) {
      if (event.target == modalPed) {
        modalPed.style.display = "none";
        document.body.style.overflow = "auto";
      }
      if (event.target == modalInst) {
        modalInst.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }
  })();

  // Script para scroll suave
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth'
        });
      }
    });
  });
</script>
